<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Colour Study — Porter's Paints</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@1,600&family=Plus+Jakarta+Sans:wght@400&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    width: 100%; height: 100%;
    overflow: hidden;
  }

  #app {
    width: 100vw; height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    transition: background-color 1.8s cubic-bezier(0.4, 0, 0.2, 1);
    position: relative;
  }

  #texture-overlay {
    position: fixed; inset: 0;
    background-image: url('../Assets/Painttexture.png');
    background-size: cover;
    background-position: center;
    mix-blend-mode: multiply;
    opacity: 0.9;
    pointer-events: none;
    z-index: 2;
  }

  #colour-info {
    position: absolute;
    top: 2.5rem; left: 50%;
    transform: translateX(-50%);
    font-family: 'Cormorant Garamond', serif;
    font-weight: 600;
    font-style: italic;
    font-size: 0.75rem;
    letter-spacing: 0.18em;
    opacity: 0.5;
    transition: color 0.8s ease;
    white-space: nowrap;
    user-select: none;
    text-align: center;
    line-height: 1.6;
    z-index: 3;
  }

  #question-container {
    text-align: center;
    padding: 2rem;
    max-width: 580px;
    width: 100%;
    position: relative;
    z-index: 3;
  }

  #question-text {
    font-family: 'Cormorant Garamond', serif;
    font-weight: 600;
    font-style: italic;
    font-size: 3.4rem;
    line-height: 1.2;
    margin-bottom: 3rem;
    transition: color 0.8s ease;
    letter-spacing: 0.01em;
  }

  #question-text.float-away {
    animation: questionFloatAway 0.42s ease forwards;
  }

  #question-text.float-in {
    animation: questionFloatIn 0.6s ease forwards;
  }

  @keyframes questionFloatAway {
    from { opacity: 1; transform: translateY(0); }
    to   { opacity: 0; transform: translateY(-18px); }
  }

  @keyframes questionFloatIn {
    from { opacity: 0; transform: translateY(14px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  #answers {
    display: flex;
    gap: 1.2rem;
    justify-content: center;
    align-items: center;
  }

  .answer-btn {
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-weight: 400;
    font-size: 0.78rem;
    letter-spacing: 0.08em;
    background: transparent;
    border: 1px solid currentColor;
    cursor: pointer;
    padding: 0.6rem 1.5rem;
    border-radius: 2rem;
    transition: opacity 0.25s ease, background 0.2s ease;
    position: relative;
    outline: none;
    -webkit-tap-highlight-color: transparent;
  }

  .answer-btn:hover { opacity: 1 !important; background: rgba(128,128,128,0.12); }
  .answer-btn:active { transform: scale(0.97); }

  .answer-btn.side { opacity: 0.82; }
  .answer-btn.neutral {
    opacity: 0.45;
    font-size: 0.66rem;
    letter-spacing: 0.06em;
    border-style: dashed;
  }

  .btn-key {
    display: block;
    font-size: 0.48rem;
    letter-spacing: 0.06em;
    opacity: 0.5;
    margin-top: 0.18rem;
    font-family: 'Plus Jakarta Sans', sans-serif;
  }

  @keyframes answerPop {
    0%   { transform: scale(1); }
    30%  { transform: scale(1.14); opacity: 1 !important; }
    65%  { transform: scale(1.05); opacity: 1 !important; }
    100% { transform: scale(1); }
  }

  .answer-btn.popped {
    animation: answerPop 0.55s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
  }

  /* Progress dots */
  #progress-indicator {
    position: absolute;
    bottom: 2.8rem; left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 8px;
    align-items: center;
    z-index: 3;
  }

  .dot {
    width: 4px; height: 4px;
    border-radius: 50%;
    transition: all 0.55s cubic-bezier(0.4, 0, 0.2, 1);
    opacity: 0.22;
  }

  .dot.answered {
    opacity: 0.6;
    transform: scale(1.35);
  }

  .dot.current {
    opacity: 0.95;
    width: 5px; height: 5px;
  }

  /* Keyboard hint */
  #keyboard-hint {
    position: absolute;
    bottom: 5.2rem; left: 50%;
    transform: translateX(-50%);
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-weight: 400;
    font-size: 0.55rem;
    letter-spacing: 0.2em;
    opacity: 0.32;
    transition: color 0.8s ease;
    white-space: nowrap;
    pointer-events: none;
    z-index: 3;
  }

  /* Save flash */
  #save-flash {
    position: absolute;
    bottom: 4.8rem; left: 50%;
    transform: translateX(-50%);
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-weight: 400;
    font-size: 0.55rem;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.4s ease, color 0.8s ease;
    z-index: 3;
  }

  /* Export button */
  #export-btn {
    position: absolute;
    bottom: 2.5rem; right: 2.5rem;
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-weight: 400;
    font-size: 0.58rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    background: transparent;
    border: none;
    cursor: pointer;
    opacity: 0.25;
    transition: opacity 0.3s ease, color 0.8s ease;
    outline: none;
    padding: 0.3rem 0;
    z-index: 3;
  }

  #export-btn:hover { opacity: 0.7; }

  /* ── Results button ─────────────────────────────────────────────────────── */
  #results-btn {
    position: absolute;
    bottom: 2.5rem; right: 2.5rem;
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-weight: 400;
    font-size: 0.65rem;
    letter-spacing: 0.28em;
    text-transform: uppercase;
    background: transparent;
    border: 1px solid currentColor;
    cursor: pointer;
    opacity: 0.7;
    transition: opacity 0.3s ease, color 0.8s ease;
    outline: none;
    padding: 0.45rem 1rem;
    border-radius: 1px;
    z-index: 3;
  }
  #results-btn:hover { opacity: 1; }

  /* ── Results overlay ────────────────────────────────────────────────────── */
  #results-overlay {
    position: fixed; inset: 0;
    background: rgba(8, 8, 8, 0.97);
    z-index: 200;
    display: none;
    flex-direction: column;
    color: rgba(255,255,255,0.85);
  }
  #results-overlay.open { display: flex; }

  #results-header {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    padding: 2rem 2.5rem 1.2rem;
    border-bottom: 1px solid rgba(255,255,255,0.08);
    flex-shrink: 0;
  }

  #results-title {
    font-family: 'Cormorant Garamond', serif;
    font-weight: 600;
    font-style: italic;
    font-size: 2rem;
    letter-spacing: 0.02em;
  }

  #results-meta {
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: 0.6rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    opacity: 0.35;
  }

  #results-close {
    background: none;
    border: none;
    color: rgba(255,255,255,0.5);
    font-size: 1rem;
    cursor: pointer;
    padding: 0.2rem 0.4rem;
    line-height: 1;
    transition: color 0.2s ease;
  }
  #results-close:hover { color: rgba(255,255,255,0.95); }

  #results-filters {
    padding: 0.85rem 2.5rem;
    display: flex;
    flex-wrap: nowrap;
    gap: 0.4rem 0.5rem;
    border-bottom: 1px solid rgba(255,255,255,0.08);
    flex-shrink: 0;
    align-items: center;
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
    scrollbar-width: none;
  }
  #results-filters::-webkit-scrollbar { display: none; }

  .filter-sep {
    width: 1px;
    height: 14px;
    background: rgba(255,255,255,0.15);
    margin: 0 0.15rem;
    align-self: center;
  }

  .filter-btn {
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-weight: 400;
    font-size: 0.58rem;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    background: transparent;
    border: 1px solid rgba(255,255,255,0.18);
    color: rgba(255,255,255,0.5);
    cursor: pointer;
    padding: 0.3rem 0.85rem;
    border-radius: 2rem;
    transition: all 0.2s ease;
    white-space: nowrap;
    flex-shrink: 0;
  }
  .filter-btn:hover {
    border-color: rgba(255,255,255,0.5);
    color: rgba(255,255,255,0.85);
  }
  .filter-btn.active {
    background: rgba(255,255,255,0.92);
    border-color: rgba(255,255,255,0.92);
    color: rgba(0,0,0,0.8);
  }

  #results-grid-wrap {
    flex: 1;
    overflow-y: auto;
    padding: 1.5rem 2.5rem 3rem;
  }

  #results-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
    gap: 12px;
  }

  .swatch-card {
    border-radius: 2px;
    overflow: hidden;
    background: rgba(255,255,255,0.04);
    transition: transform 0.18s ease, opacity 0.25s ease;
    cursor: default;
  }
  .swatch-card:hover { transform: translateY(-2px); }
  .swatch-card.hidden { display: none; }

  .swatch-colour {
    height: 80px;
    width: 100%;
  }

  .swatch-info {
    padding: 0.5rem 0.6rem 0.55rem;
  }

  .swatch-name {
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-weight: 400;
    font-size: 0.6rem;
    letter-spacing: 0.06em;
    color: rgba(255,255,255,0.7);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    margin-bottom: 0.3rem;
  }

  .swatch-tags {
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: 0.52rem;
    letter-spacing: 0.04em;
    color: rgba(255,255,255,0.35);
    line-height: 1.5;
    min-height: 0.8rem;
  }

  .swatch-tag-hi {
    color: rgba(255,255,255,0.8);
  }

  .swatch-votes {
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: 0.5rem;
    letter-spacing: 0.08em;
    color: rgba(255,255,255,0.2);
    margin-top: 0.3rem;
  }

  #results-empty {
    display: none;
    text-align: center;
    padding: 5rem 2rem;
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-size: 1.4rem;
    color: rgba(255,255,255,0.25);
  }

  /* ── Swatch detail modal ────────────────────────────────────────────────── */
  #swatch-detail {
    position: fixed; inset: 0;
    z-index: 400;
    display: none;
    align-items: center;
    justify-content: center;
    background: rgba(0,0,0,0.6);
    backdrop-filter: blur(6px);
    -webkit-backdrop-filter: blur(6px);
    padding: 2rem;
  }
  #swatch-detail.open { display: flex; }

  #swatch-detail-modal {
    width: min(460px, 100%);
    border-radius: 6px;
    overflow: hidden;
    box-shadow: 0 24px 80px rgba(0,0,0,0.5);
    position: relative;
  }

  #swatch-detail-colour {
    height: 240px;
    position: relative;
  }

  #swatch-detail-texture {
    position: absolute; inset: 0;
    background-image: url('../Assets/Painttexture.png');
    background-size: cover;
    background-position: center;
    mix-blend-mode: multiply;
    opacity: 0.9;
    pointer-events: none;
  }

  #swatch-detail-body {
    background: #0e0e0e;
    padding: 1.8rem 2rem 2rem;
    position: relative;
  }

  #swatch-detail-close {
    position: absolute;
    top: 1rem; right: 1.2rem;
    background: none;
    border: none;
    color: rgba(255,255,255,0.35);
    font-size: 0.95rem;
    cursor: pointer;
    line-height: 1;
    padding: 0.2rem;
    transition: color 0.2s;
  }
  #swatch-detail-close:hover { color: rgba(255,255,255,0.9); }

  #swatch-detail-name {
    font-family: 'Cormorant Garamond', serif;
    font-weight: 600;
    font-style: italic;
    font-size: 2rem;
    color: rgba(255,255,255,0.92);
    line-height: 1.1;
    margin-bottom: 0.25rem;
  }

  #swatch-detail-sub {
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: 0.58rem;
    letter-spacing: 0.18em;
    color: rgba(255,255,255,0.3);
    margin-bottom: 1.4rem;
  }

  #swatch-detail-tags {
    display: flex;
    flex-wrap: wrap;
    gap: 0.4rem;
    margin-bottom: 1.4rem;
  }

  .detail-tag {
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: 0.54rem;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    border: 1px solid rgba(255,255,255,0.22);
    color: rgba(255,255,255,0.65);
    padding: 0.22rem 0.7rem;
    border-radius: 2rem;
  }

  #swatch-detail-desc {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-size: 1.05rem;
    line-height: 1.6;
    color: rgba(255,255,255,0.6);
  }
</style>
</head>
<body>
<div id="app">
  <div id="colour-info"></div>

    <div id="question-container">
      <div id="question-text">—</div>
      <div id="answers">
        <button class="answer-btn side" id="btn-left" onclick="answer('left')">
          <span class="btn-label"></span>
          <span class="btn-key">← A</span>
        </button>
        <button class="answer-btn neutral" id="btn-neutral" onclick="answer('neutral')">
          <span class="btn-label">Neutral</span>
          <span class="btn-key">↑ ↓ Space</span>
        </button>
        <button class="answer-btn side" id="btn-right" onclick="answer('right')">
          <span class="btn-label"></span>
          <span class="btn-key">D →</span>
        </button>
      </div>
    </div>

    <div id="progress-indicator"></div>
    <div id="keyboard-hint"></div>
    <div id="save-flash">saved</div>
    <button id="results-btn" onclick="openResults()">Results</button>
  <div id="texture-overlay"></div>
</div>

<!-- ── Results overlay ──────────────────────────────────────────────────────── -->
<div id="results-overlay">
  <div id="results-header">
    <div id="results-title">Results</div>
    <div id="results-meta"></div>
    <button id="results-close" onclick="closeResults()">✕</button>
  </div>
  <div id="results-filters">
    <button class="filter-btn active" data-answer="all" onclick="applyFilter('all')">All</button>
    <div class="filter-sep"></div>
    <button class="filter-btn" data-answer="Warm"          onclick="applyFilter('Warm')">Warm</button>
    <button class="filter-btn" data-answer="Cool"          onclick="applyFilter('Cool')">Cool</button>
    <div class="filter-sep"></div>
    <button class="filter-btn" data-answer="Energetic"     onclick="applyFilter('Energetic')">Energetic</button>
    <button class="filter-btn" data-answer="Calm"          onclick="applyFilter('Calm')">Calm</button>
    <div class="filter-sep"></div>
    <button class="filter-btn" data-answer="Light"         onclick="applyFilter('Light')">Light</button>
    <button class="filter-btn" data-answer="Dark"          onclick="applyFilter('Dark')">Dark</button>
    <div class="filter-sep"></div>
    <button class="filter-btn" data-answer="Soft"          onclick="applyFilter('Soft')">Soft</button>
    <button class="filter-btn" data-answer="Harsh"         onclick="applyFilter('Harsh')">Harsh</button>
    <div class="filter-sep"></div>
    <button class="filter-btn" data-answer="Intimate"      onclick="applyFilter('Intimate')">Intimate</button>
    <button class="filter-btn" data-answer="Distant"       onclick="applyFilter('Distant')">Distant</button>
    <div class="filter-sep"></div>
    <button class="filter-btn" data-answer="Optimistic"    onclick="applyFilter('Optimistic')">Optimistic</button>
    <button class="filter-btn" data-answer="Contemplative" onclick="applyFilter('Contemplative')">Contemplative</button>
    <div class="filter-sep"></div>
    <button class="filter-btn" data-answer="Familiar"      onclick="applyFilter('Familiar')">Familiar</button>
    <button class="filter-btn" data-answer="Foreign"       onclick="applyFilter('Foreign')">Foreign</button>
    <div class="filter-sep"></div>
    <button class="filter-btn" data-answer="Playful"       onclick="applyFilter('Playful')">Playful</button>
    <button class="filter-btn" data-answer="Serious"       onclick="applyFilter('Serious')">Serious</button>
    <div class="filter-sep"></div>
    <button class="filter-btn" data-answer="Luxurious"     onclick="applyFilter('Luxurious')">Luxurious</button>
    <button class="filter-btn" data-answer="Humble"        onclick="applyFilter('Humble')">Humble</button>
    <div class="filter-sep"></div>
    <button class="filter-btn" data-answer="Neutral"       onclick="applyFilter('Neutral')">Neutral</button>
  </div>
  <div id="results-grid-wrap">
    <div id="results-grid"></div>
    <div id="results-empty">No colours match this filter yet.</div>
  </div>
</div>

<!-- ── Swatch detail modal ───────────────────────────────────────────────────── -->
<div id="swatch-detail">
  <div id="swatch-detail-modal">
    <div id="swatch-detail-colour">
      <div id="swatch-detail-texture"></div>
    </div>
    <div id="swatch-detail-body">
      <button id="swatch-detail-close" onclick="closeSwatchDetail()">✕</button>
      <div id="swatch-detail-name"></div>
      <div id="swatch-detail-sub"></div>
      <div id="swatch-detail-tags"></div>
      <p id="swatch-detail-desc"></p>
    </div>
  </div>
</div>

<script>

  { text: "Warm or Cool?",               left: "Warm",        right: "Cool" },
  { text: "Energetic or Calm?",          left: "Energetic",   right: "Calm" },
  { text: "Light or Dark?",              left: "Light",       right: "Dark" },
  { text: "Soft or Harsh?",              left: "Soft",        right: "Harsh" },
  { text: "Intimate or Distant?",        left: "Intimate",    right: "Distant" },
  { text: "Optimistic or Contemplative?",left: "Optimistic",  right: "Contemplative" },
  { text: "Familiar or Foreign?",        left: "Familiar",    right: "Foreign" },
  { text: "Playful or Serious?",         left: "Playful",     right: "Serious" },

];

if (!sessionId) {
  sessionId = 'sess_' + Math.random().toString(36).substr(2,9) + '_' + Date.now();
  localStorage.setItem('porters_session', sessionId);
}

let colourCounts = {};
try { colourCounts = JSON.parse(localStorage.getItem('porters_counts') || '{}'); } catch(e){}

let totalResponses = 0;
try {
  const saved = JSON.parse(localStorage.getItem('porters_responses') || '[]');
  totalResponses = saved.length;
} catch(e){}

let currentColour = null;
let currentQuestion = 0;

// ─── Utility ─────────────────────────────────────────────────────────────────

function luminance(r, g, b) {
  const l = c => { c /= 255; return c <= 0.03928 ? c/12.92 : Math.pow((c+0.055)/1.055, 2.4); };
  return 0.2126*l(r) + 0.7152*l(g) + 0.0722*l(b);
}

function textColor(r, g, b) {
  return luminance(r, g, b) > 0.32
    ? 'rgba(0,0,0,0.7)'
    : 'rgba(255,255,255,0.8)';
}

function calculateLRV(r, g, b) {
  const toLinear = c => {
    c /= 255;
    return c <= 0.04045 ? c / 12.92 : Math.pow((c + 0.055) / 1.055, 2.4);
  };
  return Math.round((0.2126 * toLinear(r) + 0.7152 * toLinear(g) + 0.0722 * toLinear(b)) * 100);
}

function getNextColour() {
  let minCount = Infinity;
  COLOURS.forEach(c => {
    const n = colourCounts[c.name] || 0;
    if (n < minCount) minCount = n;
  });
  const pool = COLOURS.filter(c => (colourCounts[c.name]||0) === minCount);
  const others = currentColour ? pool.filter(c => c.name !== currentColour.name) : pool;
  const choices = others.length > 0 ? others : pool;
  return choices[Math.floor(Math.random() * choices.length)];
}

// ─── Save response ────────────────────────────────────────────────────────────

async function saveResponse(colour, question, selected) {
  const entry = {
    colour:    colour.name,
    r: colour.r, g: colour.g, b: colour.b,
    question:  question.text,
    answer:    selected,
    timestamp: new Date().toISOString(),
    sessionId: sessionId
  };

  try {
    const all = JSON.parse(localStorage.getItem('porters_responses') || '[]');
    all.push(entry);
    localStorage.setItem('porters_responses', JSON.stringify(all));
    totalResponses = all.length;
  } catch(e) { console.warn('localStorage full:', e); }

  colourCounts[colour.name] = (colourCounts[colour.name]||0) + 1;
  localStorage.setItem('porters_counts', JSON.stringify(colourCounts));

  try {
    await fetch('/api/response', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(entry)
    });
  } catch(e) {}

  flashSaved();
}

function flashSaved() {
  const el = document.getElementById('save-flash');
  el.style.opacity = '0.45';
  setTimeout(() => { el.style.opacity = '0'; }, 1100);
}

// ─── Render ───────────────────────────────────────────────────────────────────

function render() {
  const {r, g, b} = currentColour;
  const tc = textColor(r, g, b);
  const lrv = calculateLRV(r, g, b);

  document.getElementById('app').style.backgroundColor = `rgb(${r},${g},${b})`;

  ['colour-info','question-text','keyboard-hint','save-flash','results-btn'].forEach(id => {
    const el = document.getElementById(id);
    if (el) el.style.color = tc;
  });

  document.getElementById('colour-info').innerHTML =
    `rgb(${r}, ${g}, ${b})<br>LRV ${lrv}`;

  const q = QUESTIONS[currentQuestion];
  document.getElementById('question-text').textContent = q.text;
  document.getElementById('btn-left').querySelector('.btn-label').textContent  = q.left;
  document.getElementById('btn-right').querySelector('.btn-label').textContent = q.right;
  ['btn-left','btn-neutral','btn-right'].forEach(id => {
    document.getElementById(id).style.color = tc;
  });

  const dots = document.getElementById('progress-indicator');
  dots.innerHTML = '';
  for (let i = 0; i < 9; i++) {
    const d = document.createElement('div');
    d.className = 'dot' + (i < currentQuestion ? ' answered' : i === currentQuestion ? ' current' : '');
    d.style.background = tc;
    dots.appendChild(d);
  }
}

// ─── Answer ───────────────────────────────────────────────────────────────────

async function answer(side) {
  if (busy) return;
  busy = true;

  const q = QUESTIONS[currentQuestion];
  const selected = side === 'left' ? q.left : side === 'right' ? q.right : 'Neutral';

  saveResponse(currentColour, q, selected);

  const btnMap = { left: 'btn-left', right: 'btn-right', neutral: 'btn-neutral' };
  const selectedBtn = document.getElementById(btnMap[side]);
  selectedBtn.classList.add('popped');

  const questionText = document.getElementById('question-text');
  questionText.classList.add('float-away');

  await delay(440);

  selectedBtn.classList.remove('popped');
  questionText.classList.remove('float-away');

  currentQuestion++;
  if (currentQuestion >= QUESTIONS.length) {
    currentQuestion = 0;
    currentColour = getNextColour();
  }

  render();
  questionText.classList.add('float-in');

  await delay(650);
  questionText.classList.remove('float-in');
  busy = false;
}

function delay(ms) { return new Promise(r => setTimeout(r, ms)); }

// ─── Results overlay ─────────────────────────────────────────────────────────

const ANSWER_TO_QUESTION = {};
for (const q of QUESTIONS) {
  ANSWER_TO_QUESTION[q.left]  = q.text;
  ANSWER_TO_QUESTION[q.right] = q.text;
}

// ── Colour-science heuristics ─────────────────────────────────────────────────

function rgbToHsl(r, g, b) {
  r /= 255; g /= 255; b /= 255;
  const max = Math.max(r, g, b), min = Math.min(r, g, b);
  const l = (max + min) / 2;
  if (max === min) return { h: 0, s: 0, l };
  const d = max - min;
  const s = l > 0.5 ? d / (2 - max - min) : d / (max + min);
  let h;
  switch (max) {
    case r: h = ((g - b) / d + (g < b ? 6 : 0)) / 6; break;
    case g: h = ((b - r) / d + 2) / 6; break;
    case b: h = ((r - g) / d + 4) / 6; break;
  }
  return { h: h * 360, s, l };
}

function guessAnswers(r, g, b) {
  const { h, s, l } = rgbToHsl(r, g, b);
  const lrv = calculateLRV(r, g, b);

  const isWarm = s < 0.08
    ? r >= b
    : (h < 75 || h >= 300) ? true
    : h < 155 ? s < 0.18
    : false;

  const veryLight = l > 0.78;
  const light     = l > 0.55;
  const dark      = l < 0.38;
  const veryDark  = l < 0.22;
  const highSat   = s > 0.45;
  const lowSat    = s < 0.18;

  const tag = (winner) => ({ winner, answers: { [winner]: 10 } });

  return [
    {
      question: "Warm or Cool?",
      ...tag(isWarm ? "Warm" : "Cool")
    },
    {
      question: "Energetic or Calm?",
      ...tag(highSat && !veryLight && !dark ? "Energetic" : "Calm")
    },
    {
      question: "Light or Dark?",
      ...tag(lrv > 30 ? "Light" : "Dark")
    },
    {
      question: "Soft or Harsh?",
      ...tag(lowSat || veryLight || s < 0.32 ? "Soft" : "Harsh")
    },
    {
      question: "Intimate or Distant?",
      ...tag(dark || (isWarm && !veryLight) ? "Intimate" : "Distant")
    },
    {
      question: "Optimistic or Contemplative?",
      ...tag(isWarm && light && s > 0.1 ? "Optimistic" : "Contemplative")
    },
    {
      question: "Familiar or Foreign?",
      ...tag(s > 0.6 && !veryLight && !veryDark ? "Foreign" : "Familiar")
    },
    {
      question: "Playful or Serious?",
      ...tag(isWarm && light && s > 0.28 ? "Playful" : "Serious")
    },
    {
      question: "Luxurious or Humble?",
      ...tag(
        veryLight ? "Humble"
        : dark && s > 0.1 ? "Luxurious"
        : s > 0.3 && !light ? "Luxurious"
        : "Humble"
      )
    },
  ];
}

// ── State ─────────────────────────────────────────────────────────────────────

let activeFilters  = new Set(); // empty = All
let resultsColours = [];

function openResults() {
  document.getElementById('results-overlay').classList.add('open');
  activeFilters.clear();
  syncFilterButtons();
  // Seed grid with guessed answers immediately — no waiting on server
  resultsColours = COLOURS.map(c => ({
    ...c, totalVotes: 0, questions: guessAnswers(c.r, c.g, c.b), estimated: true
  }));
  renderGrid();
  fetchResults();
}

function closeResults() {
  document.getElementById('results-overlay').classList.remove('open');
}

async function fetchResults() {
  try {
    const res  = await fetch('/api/results');
    const data = await res.json();

    const voted = {};
    for (const c of (data.colours || [])) voted[c.name] = c;

    resultsColours = COLOURS.map(c => {
      const real = voted[c.name];
      // If colour has real votes, use them; otherwise fall back to guesses
      return {
        ...c,
        totalVotes: real?.totalVotes || 0,
        questions:  real?.questions?.length ? real.questions : guessAnswers(c.r, c.g, c.b),
        estimated:  !real?.questions?.length,
      };
    });

    const totalVotes = resultsColours.reduce((s, c) => s + c.totalVotes, 0);
    const votedCount = resultsColours.filter(c => c.totalVotes > 0).length;
    document.getElementById('results-meta').textContent =
      `${totalVotes.toLocaleString()} votes · ${votedCount} of 405 colours`;

    renderGrid();
  } catch(e) {
    document.getElementById('results-meta').textContent = 'Estimated results (server offline)';
  }
}

function colourMatchesFilters(c) {
  if (activeFilters.size === 0) return true;
  for (const answer of activeFilters) {
    if (answer === 'Neutral') {
      if (!c.questions.some(q => q.winner === 'Neutral')) return false;
    } else {
      const qText = ANSWER_TO_QUESTION[answer];
      const q = c.questions.find(q => q.question === qText);
      if (!q || q.winner !== answer) return false;
    }
  }
  return true;
}

function renderGrid() {
  const grid  = document.getElementById('results-grid');
  const empty = document.getElementById('results-empty');
  grid.innerHTML = '';
  let shown = 0;

  for (const c of resultsColours) {
    if (!colourMatchesFilters(c)) continue;
    shown++;

    const card   = document.createElement('div');
    card.className = 'swatch-card';
    card.style.cursor = 'pointer';
    card.addEventListener('click', () => openSwatchDetail(c));

    const colour = document.createElement('div');
    colour.className = 'swatch-colour';
    colour.style.background = `rgb(${c.r},${c.g},${c.b})`;

    const info = document.createElement('div');
    info.className = 'swatch-info';

    const name = document.createElement('div');
    name.className = 'swatch-name';
    name.textContent = c.name;

    const tags = document.createElement('div');
    tags.className = 'swatch-tags';
    tags.innerHTML = c.questions.map(q => {
      const hi = activeFilters.has(q.winner);
      return `<span class="${hi ? 'swatch-tag-hi' : ''}">${q.winner}</span>`;
    }).join('<span style="opacity:0.25"> · </span>');

    const votes = document.createElement('div');
    votes.className = 'swatch-votes';
    votes.textContent = c.totalVotes > 0
      ? `${c.totalVotes} vote${c.totalVotes !== 1 ? 's' : ''}`
      : 'estimated';

    info.appendChild(name);
    info.appendChild(tags);
    info.appendChild(votes);
    card.appendChild(colour);
    card.appendChild(info);
    grid.appendChild(card);
  }

  empty.style.display = shown === 0 ? 'block' : 'none';
}

// ─── Swatch detail ────────────────────────────────────────────────────────────

function generateDescription(questions) {
  const t = {};
  for (const q of questions) t[q.question] = q.winner;

  const warm     = t["Warm or Cool?"]                === "Warm";
  const light    = t["Light or Dark?"]               === "Light";
  const calm     = t["Energetic or Calm?"]           === "Calm";
  const intimate = t["Intimate or Distant?"]         === "Intimate";
  const optimist = t["Optimistic or Contemplative?"] === "Optimistic";
  const soft     = t["Soft or Harsh?"]               === "Soft";
  const familiar = t["Familiar or Foreign?"]         === "Familiar";
  const playful  = t["Playful or Serious?"]          === "Playful";
  const luxe     = t["Luxurious or Humble?"]         === "Luxurious";

  const opens = {
    "WLC": "A colour that rests easily in a room — warm and unhurried, like light filtered through thin curtains.",
    "WLE": "A colour full of warmth and life, bright enough to animate a space without claiming too much of it.",
    "WDC": "A slow, deeply warm colour — the kind that turns a room amber at the edges and holds it there.",
    "WDE": "A rich, warm colour with real presence: full of depth, and unapologetic about it.",
    "CLC": "A colour of particular quietness — cool and clear, it brings a kind of mountain-morning stillness to a room.",
    "CLE": "A cool, focused colour with a clean edge, sharpening everything it shares a space with.",
    "CDC": "A colour that draws a room inward — cool, deep, and profoundly still.",
    "CDE": "A cool, dark colour with authority — purposeful, and unlikely to recede.",
  };
  const key = `${warm?"W":"C"}${light?"L":"D"}${calm?"C":"E"}`;
  const sentence1 = opens[key] || "A colour of considered character.";

  const mids = {
    "IO": "It draws people together — close, encouraging, and generous with warmth.",
    "IC": "It turns a room inward, creating the kind of quiet that makes space for thought.",
    "DO": "It lifts a space outward — open, generous, and easy to be inside.",
    "DC": "It creates space without filling it, lending a thoughtful remove to the room.",
  };
  const sentence2 = mids[`${intimate?"I":"D"}${optimist?"O":"C"}`] || "";

  const traits = [];
  if (!soft)    traits.push("direct in its effect");
  if (luxe)     traits.push("quietly luxurious");
  if (!familiar) traits.push("carrying something unexpected");
  if (playful)  traits.push("willing to be light");

  let sentence3 = "";
  if (traits.length > 0) {
    const joined = traits.length === 1
      ? traits[0]
      : traits.slice(0, -1).join(", ") + " and " + traits[traits.length - 1];
    sentence3 = joined.charAt(0).toUpperCase() + joined.slice(1) + ".";
  }

  return [sentence1, sentence2, sentence3].filter(Boolean).join(" ");
}

function openSwatchDetail(c) {
  const lrv = calculateLRV(c.r, c.g, c.b);
  document.getElementById('swatch-detail-colour').style.background = `rgb(${c.r},${c.g},${c.b})`;
  document.getElementById('swatch-detail-name').textContent = c.name;
  document.getElementById('swatch-detail-sub').textContent =
    `rgb(${c.r}, ${c.g}, ${c.b})  ·  LRV ${lrv}${c.estimated ? '  ·  estimated' : ''}`;
  document.getElementById('swatch-detail-tags').innerHTML =
    c.questions.map(q =>
      `<span class="detail-tag">${q.winner}</span>`
    ).join('');
  document.getElementById('swatch-detail-desc').textContent = generateDescription(c.questions);
  document.getElementById('swatch-detail').classList.add('open');
}

function closeSwatchDetail() {
  document.getElementById('swatch-detail').classList.remove('open');
}

document.getElementById('swatch-detail').addEventListener('click', e => {
  if (e.target === document.getElementById('swatch-detail')) closeSwatchDetail();
});

function applyFilter(answer) {
  if (answer === 'all') {
    activeFilters.clear();
  } else {
    activeFilters.has(answer) ? activeFilters.delete(answer) : activeFilters.add(answer);
  }
  syncFilterButtons();
  renderGrid();
}

function syncFilterButtons() {
  document.querySelectorAll('.filter-btn').forEach(btn => {
    const a = btn.dataset.answer;
    btn.classList.toggle('active',
      a === 'all' ? activeFilters.size === 0 : activeFilters.has(a)
    );
  });
}

// Close on Escape (innermost layer first)
document.addEventListener('keydown', e => {
  if (e.key !== 'Escape') return;
  if (document.getElementById('swatch-detail').classList.contains('open')) {
    closeSwatchDetail();
  } else if (document.getElementById('results-overlay').classList.contains('open')) {
    closeResults();
  }
});

// ─── Keyboard ────────────────────────────────────────────────────────────────

document.addEventListener('keydown', e => {
  if (document.getElementById('results-overlay').classList.contains('open')) return;
  if (e.key === 'ArrowLeft'  || e.key === 'a') answer('left');
  if (e.key === 'ArrowRight' || e.key === 'd') answer('right');
  if (e.key === ' ' || e.key === 'ArrowUp' || e.key === 'ArrowDown') {
    e.preventDefault();
    answer('neutral');
  }
});

// ─── Init ─────────────────────────────────────────────────────────────────────

currentColour = getNextColour();
render();
</script>
